plugins:
  # ---------------------------------------------------------
  # Global CORS Configuration
  # ---------------------------------------------------------
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600

  # ---------------------------------------------------------
  # Global Rate Limiting
  # ---------------------------------------------------------
  - name: rate-limiting
    config:
      minute: 100
      policy: redis
      redis:
        host: "pomaieco_redis"
        port: 6379

  # ---------------------------------------------------------
  # Global Proxy Caching
  # ---------------------------------------------------------
  - name: proxy-cache
    config:
      strategy: memory
      request_method:
        - GET
      response_code:
        - 200
      cache_ttl: 300
      memory:
        dictionary_name: kong_db_cache

  # ---------------------------------------------------------
  # Global AI Agent Logging Integration
  # ---------------------------------------------------------
  # - name: http-log
  #   config:
