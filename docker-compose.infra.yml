services:
  postgres:
    image: postgres:14
    container_name: pomaieco_postgres
    environment:
      - POSTGRES_USER=pomegranate
      - POSTGRES_PASSWORD=pomegranate
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - pomaieco_network

  cassandra:
    image: cassandra:latest
    container_name: chat_cassandra
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
      - CASSANDRA_CLUSTER_NAME=pomaieco_cluster
    ports:
      - "9042:9042"
    volumes:
      - ./cassandra_data:/var/lib/cassandra
    deploy:
      resources:
        limits:
          memory: 800M
    networks:
      - pomaieco_network

  redis:
    image: redis:alpine
    container_name: pomaieco_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - pomaieco_network

  kong1:
    image: kong:latest
    container_name: kong1
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_PROXY_LISTEN=0.0.0.0:8000
    volumes:
      - ./kong.yml:/etc/kong/kong.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - pomaieco_network

  kong2:
    image: kong:latest
    container_name: kong2
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_PROXY_LISTEN=0.0.0.0:8000
    volumes:
      - ./kong.yml:/etc/kong/kong.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - pomaieco_network

  gateway_lb:
    image: nginx:alpine
    container_name: gateway_lb
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - kong1
      - kong2
    deploy:
      resources:
        limits:
          memory: 100M
    networks:
      - pomaieco_network

  kafka:
    image: apache/kafka:3.7.0
    container_name: logging_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_DIRS=/tmp/logs
      - KAFKA_JVM_PERFORMANCE_OPTS=-Xmx512m -Xms512m
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://logging_kafka:9092
      - KAFKA_NODE_ID=0
    deploy:
      resources:
        limits:
          memory: 600M
    networks:
      - pomaieco_network

  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: logging_flink_jm
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1024m
    deploy:
      resources:
        limits:
          memory: 1200M
    networks:
      - pomaieco_network

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: logging_flink_tm
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        taskmanager.memory.process.size: 1024m
    deploy:
      resources:
        limits:
          memory: 1200M
    networks:
      - pomaieco_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: logging_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 1200M
    networks:
      - pomaieco_network

  qdrant:
    image: qdrant/qdrant:v1.8.2
    container_name: logging_qdrant
    ports:
      - "6333:6333"
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
    volumes:
      - ./qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 600M
    networks:
      - pomaieco_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: logging_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 1000M
    networks:
      - pomaieco_network

  minio:
    image: minio/minio:latest
    container_name: pomaieco_minio
    ports:
      - "9000:9000" # Port API cho Backend kết nối
      - "9001:9001" # Port Web Console quản lý
    environment:
      MINIO_ROOT_USER: pomaieco_admin
      MINIO_ROOT_PASSWORD: pomaieco_password123
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - pomaieco_network

  gitea:
    image: gitea/gitea:latest
    container_name: local_gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    ports:
      - "3000:3000"
      - "222:22"
    volumes:
      - ./gitea_data:/data
    networks:
      - pomaieco_network

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: local_jenkins
    restart: always
    ports:
      - "8080:8080" # Jenkins Web UI
      - "50000:50000" # JNLP Agents (optional)
    volumes:
      - ./jenkins_data:/var/jenkins_home
      # Mount the host Docker socket so Jenkins can build and start containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the project directory so Jenkins can see the compose files easily
      - .:/home/autocookie/pomaieco
    networks:
      - pomaieco_network

  prometheus:
    image: prom/prometheus:latest
    container_name: pomaieco_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # File cấu hình
      - ./prometheus_data:/prometheus # Lưu data tránh mất khi restart
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d' # THỦ THUẬT 1: Chỉ giữ log số liệu trong 7 ngày (Quá hạn tự xóa)
      - '--storage.tsdb.wal-compression'    # THỦ THUẬT 2: Nén dữ liệu trên RAM để tiết kiệm 40% dung lượng
      - '--web.listen-address=0.0.0.0:9090'
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 500M
    networks:
      - pomaieco_network

  grafana:
    image: grafana/grafana:latest
    container_name: pomaieco_grafana
    restart: unless-stopped
    ports:
      - "3004:3000"
    volumes:
      - ./grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - pomaieco_network

  pomaieco_portainer:
    image: portainer/portainer-ce:latest
    container_name: pomaieco_portainer
    restart: unless-stopped
    ports:
      - "9002:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - pomaieco_network

  pomaieco_cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: pomaieco_cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - pomaieco_network

networks:
  pomaieco_network:
    external: true